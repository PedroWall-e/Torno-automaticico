[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Aqui garantimos que o ArduinoJson baixe sozinho sem vc precisar clicar em nada
lib_deps =
    bblanchon/ArduinoJson@^6.21.3

; Flags úteis para o ESP32-S3 se comunicar via CDC (USB Nativo) e printar erros corretamente
build_flags =
    -D CORE_DEBUG_LEVEL=1
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
